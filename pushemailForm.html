<html>
	<head>
		<title>Register for Push Notifications</title>
	</head>

	<body>

		<form id="pushform">
			<label>email</label>
			<input type="email" id="email" required>
			<button type="submit" id="formsubmit">Submit</button>
		</form>
		
		<script>
			document.getElementById("pushform").addEventListener("submit", function(even) {
				even.preventDefault();

				const email = document.getElementById("email").value;
				const sessionid = localStorage.getItem("sessionID");
				const data = {email: email, sessionid: sessionid};
				const jsonData = JSON.stringify(data);
				console.log("Data being sent:", jsonData);
				var url = "";
				const XMLHttpInstance = new XMLHttpRequest();
				XMLHttpInstance.open("POST", url, true);
				XMLHttpInstance.setRequestHeader("Content-Type", "application/json");
				XMLHttpInstance.onreadystatechange = function () {
					if(XMLHttpInstance.readyState === 4) {
						try {
							if (XMLHttpInstance.status === 200) {
								const response = JSON.parse(XMLHttpInstance.responseText);
								console.log(response);
								alert("Your Signed Up.");

							}else {
								console.log(XMLHttpInstance.status, XMLHttpInstance.responseText);
								alert("Sign Up Failure: ");

							}
						} catch (err){
							console.error("Server Response failure", err);
							alert("Error occurred. Try again.");


					}
				}
				};
				XMLHttpInstance.send(jsonData);
			});
		</script>
	</body>
</html>
