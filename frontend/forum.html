<!DOCTYPE html>
<html>
<head>
    <title>Forum</title>
    <script>
        var currentThreadId = null;

        window.onload = function() {
            loadThreads();
        };

        function loadThreads() {
            var url = "../backend/getForum.php";
            var XMLHttpInstance = new XMLHttpRequest();
            XMLHttpInstance.open("POST", url, true);
            XMLHttpInstance.setRequestHeader("Content-Type", "application/json");
            XMLHttpInstance.onreadystatechange = function() {
                if (XMLHttpInstance.readyState === 4 && XMLHttpInstance.status === 200) {
                    var response = JSON.parse(XMLHttpInstance.responseText);
                    showThreads(response.threads || []);
                }
            };
            XMLHttpInstance.send();
        }

        function showThreads(threads) {
            var list = document.getElementById("threadList");
            list.innerHTML = "";
            if (threads.length === 0) {
                list.innerHTML = "<p>No threads yet.</p>";
                return;
            }
            threads.forEach(function(t) {
                var div = document.createElement("div");
                div.innerHTML = '<a href="#" onclick="viewThread(' + t.id + '); return false;">' + t.title + "</a> by " + t.username;
                list.appendChild(div);
            });
        }

        function viewThread(threadId) {
            currentThreadId = threadId;
            document.getElementById("threadListView").style.display = "none";
            document.getElementById("threadDetailView").style.display = "block";
            
            var url = "../backend/getThread.php";
            var XMLHttpInstance = new XMLHttpRequest();
            XMLHttpInstance.open("POST", url, true);
            XMLHttpInstance.setRequestHeader("Content-Type", "application/json");
            XMLHttpInstance.onreadystatechange = function() {
                if (XMLHttpInstance.readyState === 4 && XMLHttpInstance.status === 200) {
                    var response = JSON.parse(XMLHttpInstance.responseText);
                    showThreadDetail(response.thread, response.posts || []);
                }
            };
            XMLHttpInstance.send(JSON.stringify({thread_id: threadId}));
        }

        function showThreadDetail(thread, posts) {
            document.getElementById("threadTitle").textContent = thread.title;
            document.getElementById("threadBody").textContent = thread.content;
            
            var list = document.getElementById("postList");
            list.innerHTML = "";
            if (posts.length === 0) {
                list.innerHTML = "<p>No replies yet.</p>";
            } else {
                posts.forEach(function(p) {
                    var div = document.createElement("div");
                    var deleteButton = "";
                    if (p.user_id == localStorage.getItem("user_id")) {
                        deleteButton = ' <button onclick="deletePost(' + p.id + ')">Delete</button>';
                    }
                    div.innerHTML = "<p><b>" + p.username + ":</b> " + p.content + deleteButton + "</p>";
                    list.appendChild(div);
                });
            }
        }

        function createThread() {
            var title = document.getElementById("newTitle").value;
            var content = document.getElementById("newContent").value;
            var user_id = localStorage.getItem("user_id");
            
            var url = "../backend/createThread.php";
            var XMLHttpInstance = new XMLHttpRequest();
            XMLHttpInstance.open("POST", url, true);
            XMLHttpInstance.setRequestHeader("Content-Type", "application/json");
            XMLHttpInstance.onreadystatechange = function() {
                if (XMLHttpInstance.readyState === 4 && XMLHttpInstance.status === 200) {
                    alert("Thread made!");
                    document.getElementById("newTitle").value = "";
                    document.getElementById("newContent").value = "";
                    loadThreads();
                } else if (XMLHttpInstance.readyState === 4) {
                    alert("Failed to create thread.");
                }
            };
            XMLHttpInstance.send(JSON.stringify({title: title, content: content, user_id: user_id}));
        }

        function addPost() {
            var content = document.getElementById("replyText").value;
            var user_id = localStorage.getItem("user_id");
            
            var url = "../backend/addPost.php";
            var XMLHttpInstance = new XMLHttpRequest();
            XMLHttpInstance.open("POST", url, true);
            XMLHttpInstance.setRequestHeader("Content-Type", "application/json");
            XMLHttpInstance.onreadystatechange = function() {
                if (XMLHttpInstance.readyState === 4 && XMLHttpInstance.status === 200) {
                    document.getElementById("replyText").value = "";
                    viewThread(currentThreadId);
                } else if (XMLHttpInstance.readyState === 4) {
                    alert("Failed to create post.");
                }
            };
            XMLHttpInstance.send(JSON.stringify({thread_id: currentThreadId, content: content, user_id: user_id}));
        }

        function deletePost(postId) {
            if (!confirm("Delete your post?")) return;
            var user_id = localStorage.getItem("user_id");
            
            var url = "../backend/deletePost.php";
            var XMLHttpInstance = new XMLHttpRequest();
            XMLHttpInstance.open("POST", url, true);
            XMLHttpInstance.setRequestHeader("Content-Type", "application/json");
            XMLHttpInstance.onreadystatechange = function() {
                if (XMLHttpInstance.readyState === 4 && XMLHttpInstance.status === 200) {
                    viewThread(currentThreadId);
                } else if (XMLHttpInstance.readyState === 4) {
                    alert("Failed to remove post.");
                }
            };
            XMLHttpInstance.send(JSON.stringify({post_id: postId, user_id: user_id}));
        }

        function backToList() {
            document.getElementById("threadListView").style.display = "block";
            document.getElementById("threadDetailView").style.display = "none";
            currentThreadId = null;
        }

        function logout() {
            localStorage.removeItem("sessionID");
            window.location.href = "login.html";
        }
    </script>
</head>
<body>
        
    <nav>
        <a href="home.html">Home</a>
        <a href="watchlist.html">Watchlist</a> 
        <a href="forum.html">Forum</a>
        <a href="notifications.html">Notifications</a>
		<button id="logout" onclick="logout()">Logout</button>
    </nav>

    <div id="threadListView">
        <h1>Forum Threads</h1>
        <div id="threadList"></div>
        
        <h2>Create New Thread</h2>
        <input type="text" id="newTitle" required><br><br>
        <textarea id="newContent" required></textarea><br>
        <button onclick="createThread()">Create Thread</button>
    </div>

    <div id="threadDetailView" style="display:none;">
        <button onclick="backToList()">Back to Threads</button>
        <h1 id="threadTitle"></h1>
        <p id="threadBody"></p>
        
        <h2>Replies</h2>
        <div id="postList"></div>
        
        <h3>Post a Reply</h3>
        <textarea id="replyText" required></textarea>
        <button onclick="addPost()">Post Reply</button>
    </div>
</body>
</html>
