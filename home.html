<!DOCTYPE html>
<html>
<head>
	<script>
		var sessionID = localStorage.getItem('sessionID')
		if ("sessionID" == null) {
			window.location.replace("login.html");
			console.log("null hit");
		}
	</script>
	<title>Home Page</title>
</head>
<body> 

	<h1>Welcome!</h1>
	<p>You are logged in.</p>
	<form id="validate">
		<button type="submit">Validate</button>
	</form>

	<script>
		function requestValidation()
		{
			var sessionID = localStorage.getItem('sessionID')
			var message = '{"sessionID": "' + sessionID + '"}'
			console.log(sessionID);
			var url = "http://localhost/backend/validate.php";
			console.log(message)
			const XMLHttpInstance = new XMLHttpRequest();
			
			XMLHttpInstance.open("POST", url, true);
			XMLHttpInstance.setRequestHeader("Content-Type", "application/json");
			XMLHttpInstance.onreadystatechange = function() 
			{
				if(XMLHttpInstance.readyState === 4) 
				{
					try 
					{
						const response = JSON.parse(XMLHttpInstance.responseText);

						if (XMLHttpInstance.status === 200) 
						{
							console.log(XMLHttpInstance.status, XMLHttpInstance.responseText);
							alert("validation success:" + (response.message));
						} else 
						{

							window.location.replace("login.html")
							console.log(XMLHttpInstance.status, XMLHttpInstance.responseText);
							alert("validation failure:" + (response.message));
							
						}
					}catch(err) 
					{
						console.error(XMLHttpInstance.responseText);
						alert("Server Response Invalid");
						window.location.herf = "login.html";
					}
				}
			};
			XMLHttpInstance.send(message);
		};
		setInterval(requestValidation, 1000);
	</script>
</body>










</html>
